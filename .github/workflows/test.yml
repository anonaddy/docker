name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: addy:test
  CONTAINER_NAME: addy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Generate DKIM private key
        run: |
          docker compose run --rm gen-dkim
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@46267a6e61cd56aac2fc79943df180152f4c89d6 # v1.10.1
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "ready to handle connections"
          timeout: 120
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
