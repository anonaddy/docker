name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: addy:test
  CONTAINER_NAME: addy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          targets: image-local
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Generate DKIM private key
        run: |
          docker compose run --rm gen-dkim
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@64a0bfaf6e6bb1c448d6e4c42b11034ee7094f16 # v1.7.1
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: "ready to handle connections"
          timeout: 120
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          ANONADDY_IMAGE: ${{ env.BUILD_TAG }}
          ANONADDY_CONTAINER: ${{ env.CONTAINER_NAME }}
